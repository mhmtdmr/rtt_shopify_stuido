server {

    server_name shopify.rttintelligence.com;
    root /home/www/rtt_shopify_stuido;
    index index.html;

    access_log /var/log/nginx/shopify.rttintelligence.com.access.log;
    error_log /var/log/nginx/shopify.rttintelligence.com.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/shopify.rttintelligence.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/shopify.rttintelligence.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = shopify.rttintelligence.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;

    server_name shopify.rttintelligence.com;
    return 404; # managed by Certbot


}